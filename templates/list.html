{{define "list.html"}}<!doctype html>
<html lang="hr"><head>{{template "head" .}}<title>Računi</title></head><body>
<h1>Računi</h1>
<p><a class="btn" href="/invoices/new">+ Novi račun</a></p>
<div class="scroll">
<table><thead><tr><th>Broj</th><th>Datum</th><th>Kupac</th><th class="r">Iznos (€)</th></tr></thead>
<tbody>
{{range .}}<tr><td><a href="/invoices/{{.ID}}">{{.Number}}</a></td><td>{{.IssueDate}}</td><td>{{.Customer}}</td><td class="r">{{eur .TotalCents}}</td></tr>
{{else}}<tr><td colspan="4">Nema računa.</td></tr>{{end}}
</tbody></table>
</div>
</body></html>{{end}}
